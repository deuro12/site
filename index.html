<style>

body{

</style>
</head>

<body>

<header>
<div class="logoBox">
<img src="deuro.tn.png" class="logo">
Deuro.tn
</div>

<div class="cartIcon" id="cartCount">0</div>
</header>

<div class="admin" id="adminPanel">

<h3>ADMIN PANEL</h3>

<input id="pname" placeholder="Nom">
<input id="pprice" type="number" placeholder="Prix">
<input id="psizes" placeholder="Tailles S,M,L">
<input id="pimg" type="file" multiple>

<select id="pcat">
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>

<button onclick="addProduct()">Ajouter</button>

<div id="adminList"></div>

</div>

<div class="container" id="shop"></div>
<div class="detail" id="detail"></div>

<script>

/* SECRET ADMIN INVISIBLE */

let secret="aida"
let typed=""

document.addEventListener("keydown",e=>{
typed+=e.key.toLowerCase()
if(typed.length>secret.length) typed=typed.slice(1)

if(typed===secret){
document.getElementById("adminPanel").style.display="block"
alert("ADMIN MODE ACTIVÉ")
renderAdmin()
}
})

let produits = JSON.parse(localStorage.getItem("produits")) || []

function saveProducts(){
localStorage.setItem("produits",JSON.stringify(produits))
}

/* ADD PRODUCT FIXED */

function addProduct(){

let name=pname.value.trim()
let price=parseFloat(pprice.value)
let sizes=psizes.value.trim()
let cat=pcat.value
let files=pimg.files

if(!name || !price || !sizes || files.length==0){
alert("Remplir tout")
return
}

let images=[]
let readers=[]

for(let f of files){

readers.push(new Promise(res=>{
let r=new FileReader()
r.onload=e=>{
images.push(e.target.result)
res()
}
r.readAsDataURL(f)
}))

}

Promise.all(readers).then(()=>{

produits.push({
name,
price,
sizes:sizes.split(","),
cat,
imgs:images,
date:Date.now()
})

saveProducts()

alert("Produit ajouté ✅")

pname.value=""
pprice.value=""
psizes.value=""
pimg.value=""

render()
renderAdmin()

})

}

/* DELETE PRODUCT */

function deleteProduct(i){

if(confirm("Supprimer ?")){
produits.splice(i,1)
saveProducts()
render()
renderAdmin()
}

}

function renderAdmin(){

let html="<h3>Produits</h3>"

produits.forEach((p,i)=>{

html+=`
<div class="adminCard">
${p.name} - ${p.price}TND
<button onclick="deleteProduct(${i})">Supprimer</button>
</div>
`

})

adminList.innerHTML=html

}

/* SHOP */

function render(){

let html=""

produits.forEach((p,i)=>{

html+=`
<div class="product">
<img src="${p.imgs[0]}">
<h3>${p.name}</h3>
<h4>${p.price} TND</h4>
</div>
`

})

shop.innerHTML=html

}

render()

</script>

</body>
</html>
