<body>

<header>
<div class="logoBox">
<img src="deuro.tn.png" class="logo">
Deuro.tn
</div>

<div style="display:flex;gap:10px">
<div class="adminBtn" onclick="toggleAdmin()">ADMIN</div>
<div class="cartIcon" id="cartCount">0</div>
</div>
</header>

<div class="admin" id="adminPanel">

<h3>Ajouter produit</h3>

<input id="pname" placeholder="Nom">
<input id="pprice" type="number" placeholder="Prix">
<input id="psizes" placeholder="Tailles S,M,L">
<input id="pimg" type="file" multiple>

<select id="pcat">
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>

<button onclick="addProduct()">Ajouter</button>

<div class="productListAdmin" id="adminList"></div>

</div>

<div class="container" id="shop"></div>
<div class="detail" id="detail"></div>

<script>

let produits = JSON.parse(localStorage.getItem("produits")) || []
let panier = JSON.parse(localStorage.getItem("panier")) || []

function saveProducts(){
localStorage.setItem("produits",JSON.stringify(produits))
}

function toggleAdmin(){
adminPanel.style.display =
adminPanel.style.display=="block" ? "none":"block"
renderAdmin()
}

function addProduct(){

let files = pimg.files
let images=[]
let promises=[]

for(let f of files){

promises.push(new Promise(res=>{
let r=new FileReader()
r.onload=e=>{
images.push(e.target.result)
res()
}
r.readAsDataURL(f)
}))

}

Promise.all(promises).then(()=>{

produits.push({
name:pname.value,
price:parseFloat(pprice.value),
sizes:psizes.value.split(","),
cat:pcat.value,
imgs:images,
date:Date.now()
})

saveProducts()
render()
renderAdmin()

})

}

function deleteProduct(i){

if(confirm("Supprimer produit ?")){
produits.splice(i,1)
saveProducts()
render()
renderAdmin()
}

}

function renderAdmin(){

let html="<h3>Produits</h3>"

produits.forEach((p,i)=>{

html+=`
<div class="adminCard">
${p.name} - ${p.price}TND
<button onclick="deleteProduct(${i})">Supprimer</button>
</div>
`

})

adminList.innerHTML=html

}

function render(){

let html=""

produits.forEach((p,i)=>{

let isNew = Date.now()-p.date < 86400000

html+=`
<div class="product" onclick="openDetail(${i})">
${isNew ? `<div class="badge">NEW</div>`:""}
<img src="${p.imgs[0]}">
<h3>${p.name}</h3>
<h4>${p.price} TND</h4>
</div>
`

})

shop.innerHTML=html

}

let currentSlide=0
let slideInterval

function openDetail(i){

let p=produits[i]
let qty=1

detail.style.display="block"

detail.innerHTML=`
<img src="${p.imgs[0]}" id="mainImg" class="mainImg">

<h2>${p.name}</h2>
<h3>${p.price} TND</h3>

<select id="size">
${p.sizes.map(s=>`<option>${s}</option>`)}
</select>

<div class="qtyBox">
<button class="qtyBtn" onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button class="qtyBtn" onclick="changeQty(1)">+</button>
</div>

<button onclick="addToCart(${i})">Ajouter panier</button>
<button class="back" onclick="render()">Retour</button>
`

currentSlide=0

clearInterval(slideInterval)

slideInterval=setInterval(()=>{
currentSlide++
if(currentSlide>=p.imgs.length) currentSlide=0
mainImg.src=p.imgs[currentSlide]
},2000)

}

function changeQty(v){

let q = parseInt(qty.innerText)

q+=v

if(q<1) q=1

qty.innerText=q

}

function addToCart(i){

let q = parseInt(qty.innerText)
let size = document.getElementById("size").value

panier.push({
name:produits[i].name,
price:produits[i].price,
size,
q
})

localStorage.setItem("panier",JSON.stringify(panier))

cartCount.innerText = panier.length

alert("Ajouté au panier")

}

render()

</script>

</body>
</html>
