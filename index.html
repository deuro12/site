<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#eef2ff,#ffffff,#fef3c7);
}

header{
background:#111827;
color:white;
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.admin{
background:white;
width:90%;
max-width:750px;
margin:20px auto;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.admin input, .admin select{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

.admin button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

.filters{
text-align:center;
margin-top:10px;
}

.filters input, .filters select{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
width:200px;
margin:5px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:30px;
}

.product{
background:white;
width:240px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
padding:18px;
text-align:center;
}

.product img{
width:100%;
border-radius:12px;
}

.qtyBox{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.qtyBtn{
background:#111;
color:white;
border:none;
width:32px;
height:32px;
border-radius:8px;
cursor:pointer;
}

.addBtn{
background:#22c55e;
color:white;
border:none;
padding:10px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
width:90%;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:8px;
border-radius:8px;
margin-top:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>Deuro.tn 🛒</header>

<div class="admin">

<h3>Ajouter Produit</h3>

<input type="text" id="pname" placeholder="Nom">
<input type="number" id="pprice" placeholder="Prix">
<input type="text" id="pimg" placeholder="Lien image">

<select id="pcat">
<option value="Tshirt">Tshirt</option>
<option value="Shoes">Shoes</option>
<option value="Cap">Cap</option>
<option value="Other">Other</option>
</select>

<button onclick="addProduct()">Ajouter</button>

</div>

<div class="filters">

<input type="text" id="search" placeholder="🔎 Rechercher..." onkeyup="render()">

<select id="filterCat" onchange="render()">
<option value="All">Toutes catégories</option>
<option value="Tshirt">Tshirt</option>
<option value="Shoes">Shoes</option>
<option value="Cap">Cap</option>
<option value="Other">Other</option>
</select>

</div>

<div class="container" id="shop"></div>

<script>

let produits=[]

function render(){

let search=document.getElementById("search").value.toLowerCase()
let cat=document.getElementById("filterCat").value

let html=""

produits.forEach((p,i)=>{

if(
(p.name.toLowerCase().includes(search)) &&
(cat=="All" || p.cat==cat)
){

html+=`
<div class="product">

<img src="${p.img}">
<h3>${p.name}</h3>
<p><b>${p.price} TND</b></p>
<p>${p.cat}</p>

<div class="qtyBox">
<button class="qtyBtn" onclick="minus('q${i}')">-</button>
<div id="q${i}">1</div>
<button class="qtyBtn" onclick="plus('q${i}')">+</button>
</div>

<button class="addBtn">Ajouter</button>

<button class="deleteBtn" onclick="deleteProduct(${i})">Supprimer</button>

</div>
`
}

})

document.getElementById("shop").innerHTML=html

}

function addProduct(){

let name=document.getElementById("pname").value
let price=document.getElementById("pprice").value
let img=document.getElementById("pimg").value
let cat=document.getElementById("pcat").value

produits.push({name,price,img,cat})

render()

}

function deleteProduct(i){

produits.splice(i,1)
render()

}

function plus(id){

let el=document.getElementById(id)
el.innerText=parseInt(el.innerText)+1

}

function minus(id){

let el=document.getElementById(id)
if(parseInt(el.innerText)>1)
el.innerText=parseInt(el.innerText)-1

}

</script>

</body>
</html>
