<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#eef2ff,#ffffff,#fce7f3);
}

header{
background:#111827;
color:white;
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.admin{
display:none;
background:white;
width:90%;
max-width:750px;
margin:20px auto;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.admin input, .admin select{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:30px;
}

.product{
background:white;
width:240px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
padding:18px;
text-align:center;
cursor:pointer;
}

.product img{
width:100%;
border-radius:12px;
}

.detail{
display:none;
background:white;
width:90%;
max-width:500px;
margin:30px auto;
padding:20px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
text-align:center;
}

button{
background:#22c55e;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.back{
background:#111827;
}

</style>

</head>

<body>

<header>Deuro.tn 🛒</header>

<div class="admin" id="adminPanel">

<h3>ADMIN PANEL</h3>

<input type="text" id="pname" placeholder="Nom produit">
<input type="number" id="pprice" placeholder="Prix">
<input type="file" id="pimg">

<select id="pcat">
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>

<button onclick="addProduct()">Ajouter</button>

</div>

<div style="text-align:center">

<input type="text" id="search" placeholder="🔎 Rechercher..." onkeyup="render()">

<select id="filterCat" onchange="render()">
<option value="All">Toutes catégories</option>
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>

</div>

<div class="container" id="shop"></div>

<div class="detail" id="detail"></div>

<script>

let produits = JSON.parse(localStorage.getItem("produits")) || []

function save(){
localStorage.setItem("produits",JSON.stringify(produits))
}

let secretCode = "admin2025"
let typed=""

document.addEventListener("keydown",function(e){

typed+=e.key

if(typed.length>secretCode.length)
typed=typed.slice(1)

if(typed===secretCode){

document.getElementById("adminPanel").style.display="block"
alert("ADMIN MODE")

}

})

function addProduct(){

let name=document.getElementById("pname").value
let price=document.getElementById("pprice").value
let cat=document.getElementById("pcat").value
let file=document.getElementById("pimg").files[0]

let reader=new FileReader()

reader.onload=function(e){

produits.push({
name,
price,
cat,
img:e.target.result
})

save()
render()

}

reader.readAsDataURL(file)

}

function render(){

document.getElementById("detail").style.display="none"

let search=document.getElementById("search").value.toLowerCase()
let cat=document.getElementById("filterCat").value

let html=""

produits.forEach((p,i)=>{

if(
p.name.toLowerCase().includes(search) &&
(cat=="All" || p.cat==cat)
){

html+=`
<div class="product" onclick="openDetail(${i})">

<img src="${p.img}">
<h3>${p.name}</h3>
<p><b>${p.price} TND</b></p>
<p>${p.cat}</p>

</div>
`
}

})

document.getElementById("shop").innerHTML=html

}

function openDetail(i){

let p=produits[i]

document.getElementById("detail").style.display="block"

document.getElementById("detail").innerHTML=`

<img src="${p.img}">
<h2>${p.name}</h2>
<h3>${p.price} TND</h3>
<p>Catégorie : ${p.cat}</p>

<select>
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<br>

<button onclick="alert('Ajouté au panier')">Ajouter au panier</button>

<br>
<button class="back" onclick="render()">Retour</button>

`

window.scrollTo(0,0)

}

render()

</script>

</body>
</html>
