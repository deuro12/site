<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#eef2ff,#ffffff,#fce7f3);
}

header{
background:#111827;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:center;
gap:15px;
font-size:26px;
font-weight:bold;
}

.logo{height:40px}

.admin{
display:none;
background:white;
width:90%;
max-width:800px;
margin:20px auto;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.admin textarea,.admin input{
width:95%;
padding:10px;
margin:6px;
border-radius:8px;
border:1px solid #ccc;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:25px;
}

.product{
background:white;
width:240px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
padding:15px;
text-align:center;
position:relative;
}

.slider{
position:relative;
}

.slider img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.6);
color:white;
border:none;
width:30px;
height:30px;
border-radius:50%;
cursor:pointer;
}

.left{left:5px}
.right{right:5px}

.deleteBtn{
background:red;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

</style>

</head>

<body>

<header>
<img src="deuro.tn.png" class="logo">
Deuro.tn
</header>

<div class="admin" id="adminPanel">

<h3>Ajouter Produits</h3>

<textarea id="bulkProducts" rows="6"
placeholder="Nom|Prix|Categorie|Tailles|Description"></textarea>

<input type="file" id="multiImg" multiple>

<button onclick="addBulk()">Ajouter</button>

</div>

<div class="container" id="shop"></div>

<script>

let produits = JSON.parse(localStorage.getItem("produits")) || []

function save(){
localStorage.setItem("produits",JSON.stringify(produits))
}

let secretCode="admin2025"
let typed=""

document.addEventListener("keydown",e=>{
typed+=e.key
if(typed.length>secretCode.length) typed=typed.slice(1)
if(typed===secretCode){
adminPanel.style.display="block"
alert("ADMIN MODE")
}
})

function addBulk(){

let lines=bulkProducts.value.split("\n")
let files=multiImg.files
let fileIndex=0

lines.forEach(line=>{

if(line.trim()=="") return

let p=line.split("|")

let name=p[0]
let price=parseInt(p[1])
let cat=p[2]
let sizes=p[3].split(",")
let desc=p[4]

let imgs=[]

for(let i=0;i<3 && fileIndex<files.length;i++){

let reader=new FileReader()

reader.onload=e=>{
imgs.push(e.target.result)

if(imgs.length==3){
produits.push({name,price,cat,sizes,desc,imgs,index:0})
save()
render()
}
}

reader.readAsDataURL(files[fileIndex])
fileIndex++

}

})

}

function slide(i,dir){

let p=produits[i]

p.index+=dir

if(p.index<0) p.index=p.imgs.length-1
if(p.index>=p.imgs.length) p.index=0

render()

}

function render(){

let html=""

produits.forEach((p,i)=>{

html+=`
<div class="product">

<div class="slider">
<img src="${p.imgs[p.index]}">

<button class="arrow left" onclick="slide(${i},-1)">‹</button>
<button class="arrow right" onclick="slide(${i},1)">›</button>
</div>

<h3>${p.name}</h3>
<p><b>${p.price} TND</b></p>
<p>${p.desc}</p>
<p>Tailles: ${p.sizes.join(",")}</p>

<button class="deleteBtn" onclick="deleteProduct(${i})">Supprimer</button>

</div>
`
})

shop.innerHTML=html

}

function deleteProduct(i){
if(confirm("Supprimer ?")){
produits.splice(i,1)
save()
render()
}
}

render()

</script>

</body>
</html>
