<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#dfe9f3,#ffffff,#e6ecf5);
min-height:100vh;
}

header{
background:#0f172a;
color:white;
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
letter-spacing:1px;
}

.form{
background:white;
width:90%;
max-width:650px;
margin:25px auto;
padding:25px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
}

.form input{
width:95%;
padding:12px;
margin:8px;
border-radius:12px;
border:1px solid #ddd;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:35px;
padding:30px;
}

.product{
background:white;
width:250px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.08);
padding:20px;
text-align:center;
transition:0.3s;
}

.product:hover{
transform:translateY(-8px);
}

.product img{
width:100%;
border-radius:14px;
}

.qtyBox{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:10px;
}

.qtyBtn{
background:#111827;
color:white;
border:none;
width:35px;
height:35px;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

.qtyNumber{
font-size:18px;
font-weight:bold;
width:30px;
text-align:center;
}

select{
width:90%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
}

button.add{
background:#22c55e;
border:none;
color:white;
padding:12px 20px;
border-radius:12px;
cursor:pointer;
margin-top:12px;
font-weight:bold;
width:90%;
}

button.add:hover{
background:#16a34a;
}

#cart{
position:fixed;
right:20px;
top:110px;
background:white;
width:280px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
padding:20px;
}

.remove{
background:red;
margin-left:8px;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>Deuro.tn 🛒</header>

<div class="form">
<h3>Informations de livraison</h3>
<input type="text" id="nom" placeholder="Nom">
<input type="text" id="prenom" placeholder="Prénom">
<input type="text" id="adresse" placeholder="Adresse">
<input type="text" id="tel" placeholder="Téléphone">
</div>

<div class="container">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>T-shirt</h3>
<p><b>25 TND</b></p>

<select id="size1">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<div class="qtyBox">
<button class="qtyBtn" onclick="minus('n1')">-</button>
<div class="qtyNumber" id="n1">1</div>
<button class="qtyBtn" onclick="plus('n1')">+</button>
</div>

<button class="add" onclick="add('T-shirt',25,'n1','size1')">Ajouter</button>
</div>

<div class="product">
<img src="ANL3.jpg">
<h3>Chaussures</h3>
<p><b>80 TND</b></p>

<select id="size2">
<option>40</option>
<option>41</option>
<option>42</option>
<option>43</option>
<option>44</option>
</select>

<div class="qtyBox">
<button class="qtyBtn" onclick="minus('n2')">-</button>
<div class="qtyNumber" id="n2">1</div>
<button class="qtyBtn" onclick="plus('n2')">+</button>
</div>

<button class="add" onclick="add('Chaussures',80,'n2','size2')">Ajouter</button>
</div>

</div>

<div id="cart">
<h3>Panier</h3>
<ul id="list"></ul>
<h4>Total : <span id="total">0</span> TND</h4>
<button class="add" onclick="send()">Commander</button>
</div>

<script>

let panier=[]
let total=0

function plus(id){
let el=document.getElementById(id)
el.innerText=parseInt(el.innerText)+1
}

function minus(id){
let el=document.getElementById(id)
if(parseInt(el.innerText)>1)
el.innerText=parseInt(el.innerText)-1
}

function add(name,price,qid,sizeid){

let q=parseInt(document.getElementById(qid).innerText)
let size=document.getElementById(sizeid).value

panier.push({name,price,q,size})
total+=price*q

display()

}

function removeItem(i){
total-=panier[i].price*panier[i].q
panier.splice(i,1)
display()
}

function display(){

let html=""

panier.forEach((p,i)=>{
html+=`<li>${p.name} (${p.size}) x${p.q}
<button class="remove" onclick="removeItem(${i})">X</button></li>`
})

document.getElementById("list").innerHTML=html
document.getElementById("total").innerText=total

}

function send(){

let nom=document.getElementById("nom").value
let prenom=document.getElementById("prenom").value
let adresse=document.getElementById("adresse").value
let tel=document.getElementById("tel").value

let msg="Commande Deuro.tn %0A"
msg+="Nom : "+nom+" %0A"
msg+="Prénom : "+prenom+" %0A"
msg+="Adresse : "+adresse+" %0A"
msg+="Téléphone : "+tel+" %0A"
msg+="Produits : %0A"

panier.forEach(p=>{
msg+=p.name+" Taille:"+p.size+" x"+p.q+" %0A"
})

window.open("https://wa.me/33754436855?text="+msg)

}

</script>

</body>
</html>
