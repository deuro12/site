<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deuro.tn</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

header{
background:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 20px rgba(0,0,0,0.08);
position:sticky;
top:0;
z-index:1000;
}

.logoBox{
display:flex;
align-items:center;
gap:10px;
font-size:26px;
font-weight:bold;
color:#111827;
}

.logo{height:45px}

.cartIcon{
background:#22c55e;
color:white;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.searchBox{
text-align:center;
padding:20px;
}

.searchBox input,.searchBox select{
padding:12px;
border-radius:12px;
border:1px solid #ddd;
margin:5px;
width:200px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:20px;
}

.product{
background:white;
width:240px;
border-radius:20px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.07);
position:relative;
}

.product:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.product img{
width:100%;
border-radius:15px;
}

.stockBadge{
position:absolute;
top:10px;
left:10px;
background:#ef4444;
color:white;
padding:4px 10px;
border-radius:10px;
font-size:12px;
}

.promoBadge{
position:absolute;
top:10px;
right:10px;
background:#22c55e;
color:white;
padding:4px 10px;
border-radius:10px;
font-size:12px;
}

.oldPrice{
text-decoration:line-through;
color:#999;
font-size:14px;
}

button{
background:linear-gradient(45deg,#22c55e,#16a34a);
color:white;
border:none;
padding:8px 15px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:5px;
}

button:disabled{
background:#aaa;
cursor:not-allowed;
}

#cart{
position:fixed;
right:20px;
top:110px;
background:white;
width:300px;
border-radius:20px;
padding:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
max-height:70vh;
overflow:auto;
}

.qtyBtn{
background:#111827;
color:white;
border:none;
width:25px;
height:25px;
border-radius:6px;
}

.remove{
background:red;
color:white;
border:none;
border-radius:6px;
}

.modalOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
z-index:2000;
}

.modal{
background:white;
padding:30px;
border-radius:25px;
width:90%;
max-width:500px;
animation:pop 0.3s;
}

@keyframes pop{
from{transform:scale(0.7);opacity:0}
to{transform:scale(1);opacity:1}
}

.admin{
display:none;
background:white;
width:90%;
max-width:750px;
margin:20px auto;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.admin input,.admin select{
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ddd;
}

</style>
</head>

<body>

<header>
<div class="logoBox">
<img src="deuro.tn.png" class="logo">
Deuro.tn
</div>
<span class="cartIcon" id="cartCount">0</span>
</header>

<div class="admin" id="adminPanel">
<h3>ADMIN PANEL</h3>

<input id="pname" placeholder="Nom">
<input id="pprice" type="number" placeholder="Prix">
<input id="ppromo" type="number" placeholder="Prix Promo">
<input id="pstock" type="number" placeholder="Stock">
<input id="psizes" placeholder="Tailles S,M,L">
<input id="pimg" type="file" multiple>

<select id="pcat">
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>

<button onclick="addProduct()">Ajouter / Modifier</button>

<hr>
<h3>Produits</h3>
<div id="adminList"></div>
</div>

<div class="searchBox">
<input id="search" placeholder="🔎 Rechercher..." onkeyup="render()">
<select id="filterCat" onchange="render()">
<option value="All">Toutes</option>
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>
</div>

<div class="container" id="shop"></div>

<div id="cart">
<h3>Panier</h3>
<ul id="cartList"></ul>
<h4>Total : <span id="total">0</span> TND</h4>
<button onclick="openCheckout()">Checkout</button>
</div>

<div class="modalOverlay" id="checkoutModal">
<div class="modal">

<h2>Livraison</h2>

<input id="nom" placeholder="Nom"><br>
<input id="prenom" placeholder="Prenom"><br>
<input id="adresse" placeholder="Adresse"><br>
<input id="tel" placeholder="Telephone"><br>

<button onclick="order()">Commander WhatsApp</button>
<button onclick="closeCheckout()">Fermer</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey:"AIzaSyAHeplm9Z6yL_0OSkPrtf0vJnIN0a5KUws",
authDomain:"deuro-a2bee.firebaseapp.com",
projectId:"deuro-a2bee"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let produits=[]
let panier = JSON.parse(localStorage.getItem("panier")) || []

db.collection("produits").onSnapshot(snap=>{
produits=[]
snap.forEach(doc=>{
produits.push({...doc.data(),id:doc.id})
})
render()
})

async function addProduct(){

let name=pname.value.trim()
let price=parseFloat(pprice.value)
let promo=parseFloat(ppromo.value)||0
let stock=parseInt(pstock.value)||0
let sizes=psizes.value.trim()
let cat=pcat.value
let files=pimg.files

let images=[]

for(let f of files){
let reader=new FileReader()
images.push(await new Promise(res=>{
reader.onload=e=>res(e.target.result)
reader.readAsDataURL(f)
}))
}

let data={
name,
price,
promo,
stock,
sizes:sizes.split(",").map(s=>s.trim()),
cat,
imgs:images
}

await db.collection("produits").add(data)

alert("Produit ajouté")
}

function render(){

let search=document.getElementById("search").value.toLowerCase()
let cat=document.getElementById("filterCat").value

let html=""

produits.forEach((p,i)=>{

if(p.name.toLowerCase().includes(search)&&(cat==="All"||cat===p.cat)){

html+=`
<div class="product">

${p.stock<=0 ? `<div class="stockBadge">Rupture</div>`:""}
${p.promo>0 ? `<div class="promoBadge">Promo</div>`:""}

<img src="${p.imgs[0]}">
<h3>${p.name}</h3>

${p.promo>0 ?
`<div class="oldPrice">${p.price} TND</div>
<h4>${p.promo} TND</h4>`
:
`<h4>${p.price} TND</h4>`
}

<button ${p.stock<=0?"disabled":""} onclick="addToCart(${i})">
${p.stock<=0?"Rupture":"Ajouter"}
</button>

</div>`
}

})

shop.innerHTML=html
displayCart()
}

function addToCart(i){

if(produits[i].stock<=0)return

let found=panier.find(p=>p.name===produits[i].name)

if(found)found.q++
else panier.push({name:produits[i].name,price:produits[i].promo||produits[i].price,q:1})

produits[i].stock--

localStorage.setItem("panier",JSON.stringify(panier))
displayCart()
render()
}

function displayCart(){

let html="",total=0,count=0

panier.forEach((p,i)=>{
total+=p.price*p.q
count+=p.q

html+=`
<li>
${p.name}<br>
<button class="qtyBtn" onclick="minus(${i})">-</button>
${p.q}
<button class="qtyBtn" onclick="plus(${i})">+</button>
<button class="remove" onclick="removeItem(${i})">X</button>
</li>`
})

cartList.innerHTML=html
document.getElementById("total").innerText=total
cartCount.innerText=count
}

function plus(i){panier[i].q++;displayCart()}
function minus(i){if(panier[i].q>1)panier[i].q--;else panier.splice(i,1);displayCart()}
function removeItem(i){panier.splice(i,1);displayCart()}

function openCheckout(){
checkoutModal.style.display="flex"
}

function closeCheckout(){
checkoutModal.style.display="none"
}

function order(){

let msg="Commande Deuro.tn %0A"

panier.forEach(p=>{
msg+=p.name+" x"+p.q+" %0A"
})

window.open("https://wa.me/216XXXXXXXX?text="+msg)

}

</script>

</body>
</html>
