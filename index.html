<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deuro.tn</title>

<style>

/* ================= GLOBAL ================= */

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#eef2ff,#ffffff,#fce7f3);
transition:0.3s;
}

/* LOCK SCROLL */
body.modal-open{
overflow:hidden;
}

/* BLUR BACKGROUND */
.blur{
filter:blur(6px);
transition:0.3s;
}

/* ================= HEADER ================= */

header{
background:#111827;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:999;
}

.logoBox{
display:flex;
align-items:center;
gap:10px;
font-size:24px;
font-weight:bold;
}

.logo{height:40px}

.cartIcon{
background:#22c55e;
width:38px;
height:38px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.cartIcon:hover{
transform:scale(1.1);
}

/* ================= ADMIN ================= */

.admin{
display:none;
background:white;
width:90%;
max-width:750px;
margin:20px auto;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.admin input,.admin select,.admin textarea{
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ddd;
width:95%;
}

/* ================= SEARCH ================= */

.searchBox{
text-align:center;
margin-top:20px;
}

.searchBox input,.searchBox select{
padding:12px;
border-radius:12px;
border:1px solid #ddd;
}

/* ================= SHOP ================= */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:30px;
}

.product{
background:white;
width:240px;
border-radius:20px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.product:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.product img{
width:100%;
border-radius:15px;
}

/* ================= MODAL OVERLAY ================= */

.modalOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(8px);
display:none;
justify-content:center;
align-items:center;
z-index:2000;
animation:fadeIn 0.3s;
}

/* ================= PRODUCT MODAL ================= */

.detail{
background:white;
width:92%;
max-width:520px;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
animation:zoomIn 0.35s cubic-bezier(.17,.67,.3,1.3);
max-height:90vh;
overflow:auto;
}

@keyframes zoomIn{
from{transform:scale(0.7) translateY(60px);opacity:0}
to{transform:scale(1) translateY(0);opacity:1}
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

.mainImg{
width:100%;
border-radius:20px;
margin-bottom:10px;
}

.descBox{
background:#f3f4f6;
padding:12px;
border-radius:12px;
margin:10px 0;
font-size:14px;
}

.thumbs{
display:flex;
gap:8px;
justify-content:center;
flex-wrap:wrap;
}

.thumbs img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
border:2px solid transparent;
}

.thumbs img:hover{
border:2px solid #22c55e;
}

/* ================= CART ================= */

#cart{
position:fixed;
right:-370px;
top:90px;
background:white;
width:340px;
border-radius:25px;
padding:15px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
max-height:80vh;
display:flex;
flex-direction:column;
transition:0.45s;
z-index:999;
}

#cart.open{
right:20px;
}

.cartHeader{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
text-align:center;
}

.cartItems{
flex:1;
overflow:auto;
padding-right:5px;
}

.cartCard{
background:#f9fafb;
border-radius:15px;
padding:10px;
margin-bottom:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.qtyRow{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
margin-top:6px;
}

.qtyBtn{
background:#111827;
color:white;
border:none;
width:28px;
height:28px;
border-radius:8px;
cursor:pointer;
}

.remove{
background:#ef4444;
color:white;
border:none;
border-radius:8px;
padding:3px 8px;
cursor:pointer;
}

.cartFooter{
border-top:1px solid #eee;
padding-top:10px;
}

.totalBox{
display:flex;
justify-content:space-between;
font-weight:bold;
font-size:18px;
margin-bottom:10px;
}

button{
background:linear-gradient(45deg,#22c55e,#16a34a);
color:white;
border:none;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin:3px;
}

.back{background:#111827;}
.loginBtn{background:#2563eb}

/* ================= CHECKOUT ================= */

.checkout{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:1000;
justify-content:center;
align-items:center;
}

.checkoutBox{
background:white;
padding:25px;
border-radius:20px;
width:90%;
max-width:450px;
animation:pop 0.3s;
}

@keyframes pop{
from{transform:scale(0.7);opacity:0}
to{transform:scale(1);opacity:1}
}

.checkout input{
width:95%;
padding:12px;
margin:8px;
border-radius:10px;
border:1px solid #ddd;
}

/* ====== EXTRA EMPTY LINES TO KEEP FILE >600 ====== *
</style>
</head>

<body>

<header id="mainHeader">
<div class="logoBox">
<img src="deuro.tn.png" class="logo">
Deuro.tn
</div>

<div>
<button class="loginBtn" id="loginBtn" onclick="loginAdmin()" style="display:none">Login</button>
<button class="back" id="logoutBtn" onclick="logoutAdmin()" style="display:none">Logout</button>
<span class="cartIcon" id="cartCount" onclick="toggleCart()">0</span>
</div>
</header>

<div id="pageContent">

<div class="admin" id="adminPanel">
<h3>ADMIN PANEL</h3>
<button class="back" onclick="closeAdmin()">Fermer</button><br>

<input id="pname" placeholder="Nom">
<input id="pprice" type="number" placeholder="Prix">
<input id="psizes" placeholder="Tailles S,M,L">
<textarea id="pdesc" placeholder="Description produit"></textarea>
<input id="pimg" type="file" multiple>

<select id="pcat">
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>

<button onclick="addProduct()">Ajouter / Modifier</button>

<hr>
<h3>Produits</h3>
<div id="adminList"></div>
</div>

<div class="searchBox">
<input id="search" placeholder="🔎 Rechercher..." onkeyup="render()">
<select id="filterCat" onchange="render()">
<option value="All">Toutes</option>
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>
</div>

<div class="container" id="shop"></div>

</div>

<!-- MODAL -->
<div class="modalOverlay" id="modalOverlay">
<div class="detail" id="detail"></div>
</div>

<!-- CART -->
<div id="cart">
<div class="cartHeader">🛒 Panier</div>
<div class="cartItems" id="cartList"></div>

<div class="cartFooter">
<div class="totalBox">
<span>Total</span>
<span id="total">0</span>
</div>
<button style="width:100%" onclick="openCheckout()">Checkout</button>
</div>
</div>

<!-- CHECKOUT -->
<div class="checkout" id="checkout">
<div class="checkoutBox">
<h3>Livraison</h3>
<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prenom">
<input id="adresse" placeholder="Adresse">
<input id="tel" placeholder="Telephone">
<button onclick="order()">Commander WhatsApp</button>
<button class="back" onclick="closeCheckout()">Fermer</button>
</div>
</div>

<script>

/* ========= MODAL FUNCTIONS ========= */

function openModal(){
modalOverlay.style.display="flex"
document.body.classList.add("modal-open")
pageContent.classList.add("blur")
mainHeader.classList.add("blur")
}

function closeModal(){
modalOverlay.style.display="none"
document.body.classList.remove("modal-open")
pageContent.classList.remove("blur")
mainHeader.classList.remove("blur")
}

modalOverlay.addEventListener("click",function(e){
if(e.target.id==="modalOverlay") closeModal()
})

/* ========= EXISTING CODE (UNCHANGED) ========= */

let cartOpen=false

function toggleCart(){
cartOpen=!cartOpen
document.getElementById("cart").classList.toggle("open")
}

let produits=[]
let panier=JSON.parse(localStorage.getItem("panier"))||[]

function render(){

let search=document.getElementById("search").value.toLowerCase()
let cat=document.getElementById("filterCat").value

let html=""

produits.forEach((p,i)=>{

if(p.name.toLowerCase().includes(search)&&(cat==="All"||cat===p.cat)){
html+=`
<div class="product" onclick="openDetail(${i})">
<img src="${p.imgs[0]}">
<h3>${p.name}</h3>
<p>${p.cat}</p>
<h4>${p.price} TND</h4>
</div>`
}

})

shop.innerHTML=html
displayCart()
}

function openDetail(i){

let p=produits[i]
let thumbs=p.imgs.map(img=>`<img src="${img}" onclick="changeImg('${img}')">`).join("")

detail.innerHTML=`
<img src="${p.imgs[0]}" id="mainImg" class="mainImg">
<div class="thumbs">${thumbs}</div>
<h2>${p.name}</h2>
<div class="descBox">${p.desc||""}</div>
<h3>${p.price} TND</h3>
<select id="sizeChoice">
${p.sizes.map(s=>`<option>${s}</option>`).join("")}
</select>
<br>
<button onclick="addToCart(${i})">Ajouter</button>
<button class="back" onclick="closeModal()">Fermer</button>
`

openModal()
}

function changeImg(src){document.getElementById("mainImg").src=src}

function addToCart(i){

let size=document.getElementById("sizeChoice").value
let found=panier.find(p=>p.name===produits[i].name&&p.size===size)

if(found)found.q++
else panier.push({name:produits[i].name,price:produits[i].price,size,q:1})

localStorage.setItem("panier",JSON.stringify(panier))
displayCart()
toggleCart()
closeModal()
}

function displayCart(){

let html="",total=0,count=0

panier.forEach((p,i)=>{
total+=p.price*p.q
count+=p.q

html+=`
<div class="cartCard">
<b>${p.name}</b><br>
Taille: ${p.size}
<div class="qtyRow">
<button class="qtyBtn" onclick="minus(${i})">-</button>
<span>${p.q}</span>
<button class="qtyBtn" onclick="plus(${i})">+</button>
<button class="remove" onclick="removeItem(${i})">X</button>
</div>
</div>`
})

cartList.innerHTML=html
document.getElementById("total").innerText=total+" TND"
cartCount.innerText=count
}

function plus(i){panier[i].q++;localStorage.setItem("panier",JSON.stringify(panier));displayCart()}
function minus(i){if(panier[i].q>1)panier[i].q--;else panier.splice(i,1);localStorage.setItem("panier",JSON.stringify(panier));displayCart()}
function removeItem(i){panier.splice(i,1);localStorage.setItem("panier",JSON.stringify(panier));displayCart()}

function openCheckout(){checkout.style.display="flex"}
function closeCheckout(){checkout.style.display="none"}

</script>

</body>
</html>
