<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deuro.tn</title>

<style>

body{
font-family:Arial;
margin:0;
background:url("logo.project.jpg");
background-size:cover;
background-position:center;
}

header{
background:#111827;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:999;
}

.logoBox{
display:flex;
align-items:center;
gap:10px;
font-size:24px;
font-weight:bold;
}

.logo{
height:40px;
border:2px solid black;
border-radius:10px;

box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.cartIcon{
background:#22c55e;
width:38px;
height:38px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.cartIcon:hover{
transform:scale(1.1);
}

.admin{
display:none;
background:white;
width:90%;
max-width:750px;
margin:20px auto;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.admin input,.admin select,.admin textarea{
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid #ddd;
width:95%;
}

.searchBox{
text-align:center;
margin-top:20px;
}

.searchBox input,.searchBox select{
padding:12px;
border-radius:12px;
border:1px solid #ddd;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:30px;
}

.product{
background:white;
width:240px;
border-radius:20px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.product:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.product img{
width:100%;
border-radius:15px;
}

.detail{
display:none;
background:white;
width:90%;
max-width:520px;
margin:30px auto;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.mainImg{
width:100%;
border-radius:20px;
margin-bottom:10px;
}

.descBox{
background:#f3f4f6;
padding:12px;
border-radius:12px;
margin:10px 0;
font-size:14px;
}

.thumbs{
display:flex;
gap:8px;
justify-content:center;
flex-wrap:wrap;
}

.thumbs img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
border:2px solid transparent;
}

.thumbs img:hover{
border:2px solid #22c55e;
}

/* SMART CART */

#cart{
position:fixed;
right:-370px;
top:90px;
background:white;
width:340px;
border-radius:25px;
padding:15px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
max-height:80vh;
display:flex;
flex-direction:column;
transition:0.45s;
z-index:999;
}

#cart.open{
right:20px;
}

.cartHeader{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
text-align:center;
}

.cartItems{
flex:1;
overflow:auto;
padding-right:5px;
}

.cartCard{
background:#f9fafb;
border-radius:15px;
padding:10px;
margin-bottom:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.qtyRow{
display:flex;
justify-content:center;
align-items:center;
gap:8px;
margin-top:6px;
}

.qtyBtn{
background:#111827;
color:white;
border:none;
width:28px;
height:28px;
border-radius:8px;
cursor:pointer;
}

.remove{
background:#ef4444;
color:white;
border:none;
border-radius:8px;
padding:3px 8px;
cursor:pointer;
}

.cartFooter{
border-top:1px solid #eee;
padding-top:10px;
}

.totalBox{
display:flex;
justify-content:space-between;
font-weight:bold;
font-size:18px;
margin-bottom:10px;
}

button{
background:linear-gradient(45deg,#22c55e,#16a34a);
color:white;
border:none;
padding:8px 14px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin:3px;
}

.back{background:#111827;}
.loginBtn{background:#2563eb}

/* CHECKOUT */

.checkout{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:1000;
justify-content:center;
align-items:center;
}

.checkoutBox{
background:white;
padding:25px;
border-radius:20px;
width:90%;
max-width:450px;
animation:pop 0.3s;
}

@keyframes pop{
from{transform:scale(0.7);opacity:0}
to{transform:scale(1);opacity:1}
}

.checkout input{
width:95%;
padding:12px;
margin:8px;
border-radius:10px;
border:1px solid #ddd;
}

</style>
</head>

<body>

<header>
<div class="logoBox">
<img src="logo.finale.png" class="logo">
Deuro.tn
</div>

<div>
<button class="loginBtn" id="loginBtn" onclick="loginAdmin()" style="display:none">Login</button>
<button class="back" id="logoutBtn" onclick="logoutAdmin()" style="display:none">Logout</button>
<span class="cartIcon" id="cartCount" onclick="toggleCart()">0</span>
</div>
</header>

<div class="admin" id="adminPanel">
<h3>ADMIN PANEL</h3>
<button class="back" onclick="closeAdmin()">Fermer</button><br>

<input id="pname" placeholder="Nom">
<input id="pprice" type="number" placeholder="Prix">
<input id="psizes" placeholder="Tailles S,M,L">
<textarea id="pdesc" placeholder="Description produit"></textarea>
<input id="pimg" type="file" multiple>

<select id="pcat">
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>

<button onclick="addProduct()">Ajouter / Modifier</button>

<hr>
<h3>Produits</h3>
<div id="adminList"></div>
</div>

<div class="searchBox">
<input id="search" placeholder="🔎 Rechercher..." onkeyup="render()">
<select id="filterCat" onchange="render()">
<option value="All">Toutes</option>
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>
</div>

<div class="container" id="shop"></div>
<div class="detail" id="detail"></div>

<div id="cart">
<div class="cartHeader">
<img src="./logo.project.jpeg" style="height:30px;vertical-align:middle"> 🛒 Panier
</div>
<div class="cartItems" id="cartList"></div>

<div class="cartFooter">
<div class="totalBox">
<span>Total</span>
<span id="total">0</span>
</div>
<button style="width:100%" onclick="openCheckout()">Checkout</button>
</div>
</div>

<!-- LE RESTE DU CODE JS EST STRICTEMENT IDENTIQUE -->
<div class="checkout" id="checkout">
<div class="checkoutBox">
<h3>Livraison</h3>
<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prenom">
<input id="adresse" placeholder="Adresse">
<input id="tel" placeholder="Telephone">
<button onclick="order()">Commander WhatsApp</button>
<button class="back" onclick="closeCheckout()">Fermer</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyAHeplm9Z6yL_0OSkPrtf0vJnIN0a5KUws",
authDomain:"deuro-a2bee.firebaseapp.com",
projectId:"deuro-a2bee",
storageBucket:"deuro-a2bee.firebasestorage.app",
messagingSenderId:"1002857571428",
appId:"1:1002857571428:web:66aca552c0dc3f58fc6b71"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

let isAdmin=false
let secret="deuroadmin"
let typed=""
let cartOpen=false

function toggleCart(){
cartOpen=!cartOpen
document.getElementById("cart").classList.toggle("open")
}

document.addEventListener("keydown",function(e){
typed+=e.key.toLowerCase()
if(typed.includes(secret)){
document.getElementById("loginBtn").style.display="inline-block"
typed=""
}
})

firebase.auth().onAuthStateChanged(user=>{
isAdmin=!!user
if(isAdmin){
adminPanel.style.display="block"
logoutBtn.style.display="inline-block"
loginBtn.style.display="none"
}else{
adminPanel.style.display="none"
logoutBtn.style.display="none"
}
})

function loginAdmin(){
let email=prompt("Email admin")
let pass=prompt("Password")
firebase.auth().signInWithEmailAndPassword(email,pass)
.catch(()=>alert("Erreur login"))
}

function logoutAdmin(){firebase.auth().signOut()}

function protect(){
if(!isAdmin){alert("Login admin requis");throw "not admin"}
}

let produits=[]
let panier=JSON.parse(localStorage.getItem("panier"))||[]

db.collection("produits").onSnapshot(snap=>{
produits=[]
snap.forEach(doc=>{
produits.push({...doc.data(),id:doc.id})
})
render()
})

function compress(file){
return new Promise(res=>{
let reader=new FileReader()
reader.onload=e=>{
let img=new Image()
img.onload=function(){
let canvas=document.createElement("canvas")
let max=300
let ratio=Math.min(max/img.width,max/img.height)
canvas.width=img.width*ratio
canvas.height=img.height*ratio
let ctx=canvas.getContext("2d")
ctx.drawImage(img,0,0,canvas.width,canvas.height)
res(canvas.toDataURL("image/jpeg",0.4))
}
img.src=e.target.result
}
reader.readAsDataURL(file)
})
}

let editIndex=-1

function closeAdmin(){adminPanel.style.display="none"}

async function addProduct(){
protect()

let name=pname.value.trim()
let price=parseFloat(pprice.value)
let sizes=psizes.value.trim()
let desc=pdesc.value.trim()
let cat=pcat.value
let files=pimg.files

if(name===""||isNaN(price)||sizes===""){alert("Remplir");return}

let images=[]
for(let f of files){
let base=await compress(f)
images.push(base)
}

let data={name,price,desc,sizes:sizes.split(",").map(s=>s.trim()),cat,imgs:images}

if(editIndex>=0){
await db.collection("produits").doc(produits[editIndex].id).update(data)
editIndex=-1
}else{
await db.collection("produits").add(data)
}

alert("Produit sauvegardé")
}

async function deleteProduct(i){
protect()
if(!confirm("Supprimer ?")) return
await db.collection("produits").doc(produits[i].id).delete()
}

function editProduct(i){
protect()
let p=produits[i]
adminPanel.style.display="block"
pname.value=p.name
pprice.value=p.price
psizes.value=p.sizes.join(",")
pdesc.value=p.desc||""
pcat.value=p.cat
editIndex=i
}

function render(){

detail.style.display="none"

let search=document.getElementById("search").value.toLowerCase()
let cat=document.getElementById("filterCat").value

let html=""
let adminHtml=""

produits.forEach((p,i)=>{

if(p.name.toLowerCase().includes(search)&&(cat==="All"||cat===p.cat)){
html+=`
<div class="product" onclick="openDetail(${i})">
<img src="${p.imgs[0]}">
<h3>${p.name}</h3>
<p>${p.cat}</p>
<h4>${p.price} TND</h4>
</div>`
}

if(isAdmin){
adminHtml+=`
<div style="border:1px solid #ddd;padding:10px;margin:5px;border-radius:10px">
<b>${p.name}</b> - ${p.price} TND
<button onclick="editProduct(${i})">Modifier</button>
<button onclick="deleteProduct(${i})">Supprimer</button>
</div>`
}

})

shop.innerHTML=html
adminList.innerHTML=adminHtml
displayCart()
}

function openDetail(i){

let p=produits[i]
let thumbs=p.imgs.map(img=>`<img src="${img}" onclick="changeImg('${img}')">`).join("")

detail.style.display="block"
detail.innerHTML=`
<img src="${p.imgs[0]}" id="mainImg" class="mainImg">
<div class="thumbs">${thumbs}</div>
<h2>${p.name}</h2>
<div class="descBox">${p.desc||""}</div>
<h3>${p.price} TND</h3>
<select id="sizeChoice">
${p.sizes.map(s=>`<option>${s}</option>`).join("")}
</select>
<br>
<button onclick="addToCart(${i})">Ajouter</button>
<button class="back" onclick="render()">Retour</button>
`

}

function changeImg(src){document.getElementById("mainImg").src=src}

function addToCart(i){

let size=document.getElementById("sizeChoice").value
let found=panier.find(p=>p.name===produits[i].name&&p.size===size)

if(found)found.q++
else panier.push({name:produits[i].name,price:produits[i].price,size,q:1})

localStorage.setItem("panier",JSON.stringify(panier))
displayCart()
toggleCart()
}

function displayCart(){

let html="",total=0,count=0

panier.forEach((p,i)=>{
total+=p.price*p.q
count+=p.q

html+=`
<div class="cartCard">
<b>${p.name}</b><br>
Taille: ${p.size}
<div class="qtyRow">
<button class="qtyBtn" onclick="minus(${i})">-</button>
<span>${p.q}</span>
<button class="qtyBtn" onclick="plus(${i})">+</button>
<button class="remove" onclick="removeItem(${i})">X</button>
</div>
</div>`
})

cartList.innerHTML=html
document.getElementById("total").innerText=total+" TND"
cartCount.innerText=count
}

function plus(i){panier[i].q++;localStorage.setItem("panier",JSON.stringify(panier));displayCart()}
function minus(i){if(panier[i].q>1)panier[i].q--;else panier.splice(i,1);localStorage.setItem("panier",JSON.stringify(panier));displayCart()}
function removeItem(i){panier.splice(i,1);localStorage.setItem("panier",JSON.stringify(panier));displayCart()}

function openCheckout(){checkout.style.display="flex"}
function closeCheckout(){checkout.style.display="none"}

checkout.addEventListener("click",function(e){
if(e.target.id==="checkout") closeCheckout()
})

function order(){

if(panier.length===0){alert("Panier vide");return}

let nom=document.getElementById("nom").value
let prenom=document.getElementById("prenom").value
let adresse=document.getElementById("adresse").value
let tel=document.getElementById("tel").value

let msg="Commande Deuro.tn %0A"
msg+="Nom:"+nom+" %0A"
msg+="Prenom:"+prenom+" %0A"
msg+="Adresse:"+adresse+" %0A"
msg+="Tel:"+tel+" %0A"

panier.forEach(p=>{
msg+=p.name+" Taille:"+p.size+" x"+p.q+" %0A"
})

window.open("https://wa.me/33754436855?text="+msg)
}

</script>

</body>
</html>
