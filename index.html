<script>

let panier=[]
let total=0

function add(name,price,q){
q=parseInt(q)
if(q>0){
panier.push({name:name,price:price,q:q})
total+=price*q
display()
}
}

function removeItem(i){
total-=panier[i].price*panier[i].q
panier.splice(i,1)
display()
}

function display(){
let html=""
panier.forEach((p,i)=>{
html+=`<li>${p.name} x${p.q} 
<button class="remove" onclick="removeItem(${i})">X</button></li>`
})
document.getElementById("list").innerHTML=html
document.getElementById("total").innerText=total
}

function send(){
let msg="Commande : "
panier.forEach(p=>{
msg+=p.name+" x"+p.q+" , "
})
alert(msg)
}

</script>
