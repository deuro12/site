<!DOCTYPE html>

<html>
<head>
<title>Mon Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin:0;
}

h1{
background:#27ae60;
color:white;
padding:20px;
margin:0;
}

.product{
background:white;
width:200px;
margin:20px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Mon Shop 🔥</h1>

<div class="product">
<h3>Article 1 (10€)</h3>
<input type="number" id="q1" value="0">
</div>

<div class="product">
<h3>Article 2 (20€)</h3>
<input type="number" id="q2" value="0">
</div>

<button onclick="commander()">Commander</button>

<script>
function commander(){
let a=document.getElementById("q1").value
let b=document.getElementById("q2").value
alert("Commande : Article1 x"+a+" , Article2 x"+b)
}
</script>

</body>
</html>
