<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#e3f2fd,#ffffff,#fce4ec);
}

header{
background:#111827;
color:white;
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.admin{
background:white;
width:90%;
max-width:700px;
margin:20px auto;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.admin input{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

.admin button{
background:#2563eb;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:30px;
}

.product{
background:white;
width:240px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
padding:18px;
text-align:center;
}

.product img{
width:100%;
border-radius:12px;
}

.qtyBox{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.qtyBtn{
background:#111;
color:white;
border:none;
width:32px;
height:32px;
border-radius:8px;
cursor:pointer;
}

.addBtn{
background:#22c55e;
color:white;
border:none;
padding:10px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
width:90%;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:8px;
border-radius:8px;
margin-top:8px;
cursor:pointer;
}

#cart{
position:fixed;
right:20px;
top:100px;
background:white;
width:270px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
padding:15px;
}

</style>

</head>

<body>

<header>Deuro.tn ADMIN SHOP 🛒</header>

<div class="admin">

<h3>Ajouter Produit</h3>

<input type="text" id="pname" placeholder="Nom produit">
<input type="number" id="pprice" placeholder="Prix">
<input type="text" id="pimg" placeholder="Lien image">

<button onclick="addProduct()">Ajouter</button>

</div>

<div class="container" id="shop"></div>

<div id="cart">
<h3>Panier</h3>
<ul id="list"></ul>
<h4>Total : <span id="total">0</span> TND</h4>
</div>

<script>

let produits=[]
let panier=[]
let total=0

function render(){

let html=""

produits.forEach((p,i)=>{

html+=`
<div class="product">

<img src="${p.img}">
<h3>${p.name}</h3>
<p><b>${p.price} TND</b></p>

<select id="size${i}">
<option>S</option>
<option>M</option>
<option>L</option>
<option>XL</option>
</select>

<div class="qtyBox">
<button class="qtyBtn" onclick="minus('q${i}')">-</button>
<div id="q${i}">1</div>
<button class="qtyBtn" onclick="plus('q${i}')">+</button>
</div>

<button class="addBtn" onclick="addToCart(${i})">Ajouter</button>

<button class="deleteBtn" onclick="deleteProduct(${i})">Supprimer</button>

</div>
`
})

document.getElementById("shop").innerHTML=html

}

function addProduct(){

let name=document.getElementById("pname").value
let price=document.getElementById("pprice").value
let img=document.getElementById("pimg").value

produits.push({name,price,img})

render()

}

function deleteProduct(i){

produits.splice(i,1)
render()

}

function plus(id){

let el=document.getElementById(id)
el.innerText=parseInt(el.innerText)+1

}

function minus(id){

let el=document.getElementById(id)
if(parseInt(el.innerText)>1)
el.innerText=parseInt(el.innerText)-1

}

function addToCart(i){

let q=parseInt(document.getElementById("q"+i).innerText)
let size=document.getElementById("size"+i).value

panier.push({
name:produits[i].name,
price:produits[i].price,
q,
size
})

total+=produits[i].price*q

displayCart()

}

function displayCart(){

let html=""

panier.forEach(p=>{
html+=`<li>${p.name} (${p.size}) x${p.q}</li>`
})

document.getElementById("list").innerHTML=html
document.getElementById("total").innerText=total

}

</script>

</body>
</html>
