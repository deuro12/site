
<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deuro.tn</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#eef2ff,#ffffff,#fce7f3);
}

header{
background:#0f172a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logoBox{
display:flex;
gap:10px;
align-items:center;
font-size:24px;
font-weight:bold;
}

.logo{height:40px}

.cartIcon{
background:#22c55e;
width:40px;
height:40px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* ADMIN */

.admin{
display:none;
background:white;
width:95%;
max-width:700px;
margin:20px auto;
padding:20px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.adminCard{
background:#f1f5f9;
padding:10px;
margin:8px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
}

/* SHOP */

.container{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
padding:30px;
}

.product{
background:white;
width:230px;
padding:15px;
border-radius:20px;
text-align:center;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,.1);
transition:.3s;
position:relative;
}

.product:hover{
transform:translateY(-10px);
}

.product img{
width:100%;
border-radius:15px;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:#22c55e;
color:white;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

/* DETAIL */

.detail{
display:none;
background:white;
width:95%;
max-width:500px;
margin:30px auto;
padding:20px;
border-radius:20px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.qtyBox{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.qtyBtn{
background:#0f172a;
color:white;
border:none;
width:30px;
height:30px;
border-radius:8px;
}

/* CART */

#cart{
position:fixed;
right:20px;
top:120px;
background:white;
width:280px;
padding:15px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.3);
max-height:70vh;
overflow:auto;
}

button{
background:#22c55e;
border:none;
color:white;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
}

.back{background:#111827}

</style>
</head>

<body>

<header>
<div class="logoBox">
<img src="deuro.tn.png" class="logo">
Deuro.tn
</div>

<div class="cartIcon" id="cartCount">0</div>
</header>

<div class="admin" id="adminPanel">

<h3>ADMIN PANEL</h3>

<input id="pname" placeholder="Nom">
<input id="pprice" type="number" placeholder="Prix">
<input id="psizes" placeholder="Tailles S,M,L">
<input id="pimg" type="file" multiple>

<select id="pcat">
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>

<button onclick="addProduct()">Ajouter</button>

<div id="adminList"></div>

</div>

<div class="container" id="shop"></div>
<div class="detail" id="detail"></div>

<div id="cart">
<h3>Panier</h3>
<ul id="cartList"></ul>
<h4>Total : <span id="total">0</span> TND</h4>
</div>

<script>

/* ADMIN SECRET */

let secret="aida"
let typed=""

document.addEventListener("keydown",e=>{
typed+=e.key.toLowerCase()
if(typed.length>secret.length) typed=typed.slice(1)

if(typed===secret){
adminPanel.style.display="block"
renderAdmin()
alert("ADMIN MODE")
}
})

let produits = JSON.parse(localStorage.getItem("produits")) || []
let panier = JSON.parse(localStorage.getItem("panier")) || []

function saveProducts(){
localStorage.setItem("produits",JSON.stringify(produits))
}

function saveCart(){
localStorage.setItem("panier",JSON.stringify(panier))
}

/* ADD PRODUCT */

function addProduct(){

let files=pimg.files
let images=[]
let readers=[]

for(let f of files){

readers.push(new Promise(res=>{
let r=new FileReader()
r.onload=e=>{
images.push(e.target.result)
res()
}
r.readAsDataURL(f)
}))

}

Promise.all(readers).then(()=>{

produits.push({
name:pname.value,
price:parseFloat(pprice.value),
sizes:psizes.value.split(","),
cat:pcat.value,
imgs:images,
date:Date.now()
})

saveProducts()

render()
renderAdmin()

})

}

/* DELETE */

function deleteProduct(i){

if(confirm("Supprimer ?")){
produits.splice(i,1)
saveProducts()
render()
renderAdmin()
}

}

function renderAdmin(){

let html="<h3>Produits</h3>"

produits.forEach((p,i)=>{
html+=`
<div class="adminCard">
${p.name}
<button onclick="deleteProduct(${i})">X</button>
</div>
`
})

adminList.innerHTML=html

}

/* SHOP */

function render(){

detail.style.display="none"

let html=""

produits.forEach((p,i)=>{

let isNew = Date.now()-p.date < 86400000

html+=`
<div class="product" onclick="openDetail(${i})">
${isNew?'<div class="badge">NEW</div>':''}
<img src="${p.imgs[0]}">
<h3>${p.name}</h3>
<h4>${p.price} TND</h4>
</div>
`

})

shop.innerHTML=html

displayCart()

}

/* DETAIL */

let currentIndex=0
let slideInterval

function openDetail(i){

let p=produits[i]

let thumbs = p.imgs.map(img=>`<img src="${img}" width=60 onclick="changeImg('${img}')">`).join("")

detail.style.display="block"

detail.innerHTML=`
<img src="${p.imgs[0]}" id="mainImg" style="width:100%;border-radius:15px">

<div>${thumbs}</div>

<h2>${p.name}</h2>
<h3>${p.price} TND</h3>

<select id="size">
${p.sizes.map(s=>`<option>${s}</option>`)}
</select>

<div class="qtyBox">
<button class="qtyBtn" onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button class="qtyBtn" onclick="changeQty(1)">+</button>
</div>

<button onclick="addToCart(${i})">Ajouter panier</button>
<button class="back" onclick="render()">Retour</button>
`

clearInterval(slideInterval)

slideInterval=setInterval(()=>{
currentIndex++
if(currentIndex>=p.imgs.length) currentIndex=0
mainImg.src=p.imgs[currentIndex]
},2500)

window.scrollTo(0,0)

}

function changeImg(src){
mainImg.src=src
}

function changeQty(v){
let q=parseInt(qty.innerText)
q+=v
if(q<1) q=1
qty.innerText=q
}

/* PANIER */

function addToCart(i){

let size=document.getElementById("size").value
let q=parseInt(qty.innerText)

panier.push({
name:produits[i].name,
price:produits[i].price,
size,
q
})

saveCart()
displayCart()

}

function displayCart(){

let html=""
let total=0
let count=0

panier.forEach(p=>{
html+=`<li>${p.name} (${p.size}) x${p.q}</li>`
total+=p.price*p.q
count+=p.q
})

cartList.innerHTML=html
total.innerText=total
cartCount.innerText=count

}

render()

</script>

</body>
</html>
```
