<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#eef2ff,#ffffff,#fce7f3);
}

header{
background:#111827;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:center;
gap:15px;
font-size:26px;
font-weight:bold;
}

.logo{height:40px}

.admin{
display:none;
background:white;
width:90%;
max-width:750px;
margin:20px auto;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.admin input,.admin select{
padding:10px;
margin:5px;
border-radius:8px;
border:1px solid #ccc;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:30px;
}

.product{
background:white;
width:240px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
padding:18px;
text-align:center;
cursor:pointer;
}

.product img{
width:100%;
border-radius:12px;
}

.detail{
display:none;
background:white;
width:90%;
max-width:500px;
margin:30px auto;
padding:20px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
text-align:center;
}

#cart{
position:fixed;
right:20px;
top:100px;
background:white;
width:300px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
padding:15px;
max-height:80vh;
overflow:auto;
}

.qtyBtn{
background:#111827;
color:white;
border:none;
width:25px;
height:25px;
border-radius:6px;
cursor:pointer;
}

.remove{
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.checkout{
display:none;
background:white;
width:90%;
max-width:500px;
margin:30px auto;
padding:20px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.checkout input{
width:95%;
padding:12px;
margin:8px;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#22c55e;
color:white;
border:none;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.back{background:#111827}

</style>

</head>

<body>

<header>
<img src="deuro.tn.png" class="logo">
Deuro.tn
</header>

<div class="admin" id="adminPanel">
<h3>ADMIN PANEL</h3>
<input type="text" id="pname" placeholder="Nom produit">
<input type="number" id="pprice" placeholder="Prix">
<input type="text" id="psizes" placeholder="Tailles ex: S,M,L ou 40,41">
<input type="file" id="pimg">
<select id="pcat">
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>
<button onclick="addProduct()">Ajouter</button>
</div>

<div style="text-align:center">
<input type="text" id="search" placeholder="🔎 Rechercher..." onkeyup="render()">
<select id="filterCat" onchange="render()">
<option value="All">Toutes catégories</option>
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>
</div>

<div class="container" id="shop"></div>
<div class="detail" id="detail"></div>

<div id="cart">
<h3>Panier</h3>
<ul id="cartList"></ul>
<h4>Total : <span id="total">0</span> TND</h4>
<button onclick="openCheckout()">Checkout</button>
</div>

<div class="checkout" id="checkout">
<h3>Informations Livraison</h3>
<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prénom">
<input id="adresse" placeholder="Adresse">
<input id="tel" placeholder="Téléphone">
<button onclick="order()">Commander WhatsApp</button>
<button class="back" onclick="closeCheckout()">Retour</button>
</div>

<script>

let produits=JSON.parse(localStorage.getItem("produits"))||[]
let panier=JSON.parse(localStorage.getItem("panier"))||[]
let total=0

function saveProducts(){
localStorage.setItem("produits",JSON.stringify(produits))
}

function saveCart(){
localStorage.setItem("panier",JSON.stringify(panier))
}

let secretCode="admin2025"
let typed=""

document.addEventListener("keydown",e=>{
typed+=e.key
if(typed.length>secretCode.length) typed=typed.slice(1)
if(typed===secretCode){
document.getElementById("adminPanel").style.display="block"
alert("ADMIN MODE")
}
})

function addProduct(){

let name=pname.value
let price=parseInt(pprice.value)
let cat=pcat.value
let sizes=psizes.value.split(",")

let file=pimg.files[0]
let reader=new FileReader()

reader.onload=e=>{
produits.push({name,price,cat,sizes,img:e.target.result})
saveProducts()
render()
}

reader.readAsDataURL(file)
}

function render(){

detail.style.display="none"

let search=document.getElementById("search").value.toLowerCase()
let cat=document.getElementById("filterCat").value

let html=""

produits.forEach((p,i)=>{

if(p.name.toLowerCase().includes(search) && (cat=="All"||p.cat==cat)){

html+=`
<div class="product" onclick="openDetail(${i})">
<img src="${p.img}">
<h3>${p.name}</h3>
<p><b>${p.price} TND</b></p>
</div>
`
}

})

shop.innerHTML=html
displayCart()
}

function openDetail(i){

let p=produits[i]
let sizesHTML=""

p.sizes.forEach(s=>sizesHTML+=`<option>${s}</option>`)

detail.style.display="block"

detail.innerHTML=`
<img src="${p.img}">
<h2>${p.name}</h2>
<h3>${p.price} TND</h3>

<select id="sizeChoice">${sizesHTML}</select>

<br>
<button onclick="addToCart(${i})">Ajouter au panier</button>
<button class="back" onclick="render()">Retour</button>
`

window.scrollTo(0,0)
}

function addToCart(i){

let size=sizeChoice.value

let found=panier.find(p=>p.name==produits[i].name && p.size==size)

if(found){
found.q++
}else{
panier.push({name:produits[i].name,price:produits[i].price,size,q:1})
}

saveCart()
displayCart()
}

function displayCart(){

let html=""
total=0

panier.forEach((p,i)=>{

total+=p.price*p.q

html+=`
<li>
${p.name} (${p.size})
<br>
<button class="qtyBtn" onclick="minus(${i})">-</button>
${p.q}
<button class="qtyBtn" onclick="plus(${i})">+</button>
<button class="remove" onclick="removeItem(${i})">X</button>
</li>
`
})

cartList.innerHTML=html
document.getElementById("total").innerText=total
}

function plus(i){
panier[i].q++
saveCart()
displayCart()
}

function minus(i){
if(panier[i].q>1){
panier[i].q--
}else{
panier.splice(i,1)
}
saveCart()
displayCart()
}

function removeItem(i){
panier.splice(i,1)
saveCart()
displayCart()
}

function openCheckout(){
checkout.style.display="block"
window.scrollTo(0,0)
}

function closeCheckout(){
checkout.style.display="none"
}

function order(){

let msg="Commande Deuro.tn %0A"
msg+="Nom:"+nom.value+" %0A"
msg+="Prenom:"+prenom.value+" %0A"
msg+="Adresse:"+adresse.value+" %0A"
msg+="Tel:"+tel.value+" %0A"

panier.forEach(p=>{
msg+=p.name+" Taille:"+p.size+" x"+p.q+" %0A"
})

window.open("https://wa.me/33754436855?text="+msg)
}

render()

</script>

</body>
</html>
