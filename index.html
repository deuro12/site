<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deuro.tn</title>

<style>
body{font-family:Arial;margin:0;background:linear-gradient(135deg,#eef2ff,#ffffff,#fce7f3);}
header{background:#111827;color:white;padding:15px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:999;}
.logoBox{display:flex;align-items:center;gap:10px;font-size:24px;font-weight:bold;}
.logo{height:40px}
.cartIcon{background:#22c55e;width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;transition:0.3s;}
.cartPulse{animation:pulse 0.4s}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.4)}100%{transform:scale(1)}}
.cartShake{animation:shake 0.4s}
@keyframes shake{0%{transform:translateX(0)}25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-5px)}100%{transform:translateX(0)}}
.smartMsg{position:fixed;top:90px;right:20px;background:#16a34a;color:white;padding:10px 15px;border-radius:10px;display:none;z-index:9999;font-weight:bold;}
.empty{color:#888;text-align:center;margin-top:10px}
.admin{display:none;background:white;width:90%;max-width:750px;margin:20px auto;padding:20px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.1);}
.admin input,.admin select,.admin textarea{padding:10px;margin:5px;border-radius:10px;border:1px solid #ddd;width:95%;}
.searchBox{text-align:center;margin-top:20px;}
.searchBox input,.searchBox select{padding:12px;border-radius:12px;border:1px solid #ddd;}
.container{display:flex;flex-wrap:wrap;justify-content:center;gap:25px;padding:30px;}
.product{background:white;width:240px;border-radius:20px;padding:15px;text-align:center;cursor:pointer;transition:0.3s;box-shadow:0 10px 25px rgba(0,0,0,0.08);}
.product:hover{transform:translateY(-10px);box-shadow:0 20px 40px rgba(0,0,0,0.15);}
.product img{width:100%;border-radius:15px;}
.detail{display:none;background:white;width:90%;max-width:520px;margin:30px auto;padding:25px;border-radius:25px;text-align:center;box-shadow:0 20px 40px rgba(0,0,0,0.2);}
.mainImg{width:100%;border-radius:20px;margin-bottom:10px;}
.thumbs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.thumbs img{width:60px;height:60px;object-fit:cover;border-radius:10px;cursor:pointer;border:2px solid transparent;}
.thumbs img:hover{border:2px solid #22c55e;}
#cart{position:fixed;right:20px;top:120px;background:white;width:300px;border-radius:20px;padding:15px;box-shadow:0 15px 35px rgba(0,0,0,0.2);max-height:70vh;overflow:auto;}
.qtyBtn{background:#111827;color:white;border:none;width:25px;height:25px;border-radius:6px;}
.remove{background:red;color:white;border:none;border-radius:6px;}
button{background:linear-gradient(45deg,#22c55e,#16a34a);color:white;border:none;padding:8px 14px;border-radius:10px;cursor:pointer;font-weight:bold;margin:3px;}
.back{background:#111827;}
.checkout{display:none;background:white;width:90%;max-width:500px;margin:30px auto;padding:20px;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.2);}
.checkout input{width:95%;padding:12px;margin:8px;border-radius:10px;border:1px solid #ddd;}
.loginBtn{background:#2563eb}
</style>
</head>

<body>

<div class="smartMsg" id="smartMsg">✔ Produit ajouté</div>

<header>
<div class="logoBox">
<img src="deuro.tn.png" class="logo">
Deuro.tn
</div>

<div>
<button class="loginBtn" id="loginBtn" onclick="loginAdmin()" style="display:none">Login</button>
<button class="back" id="logoutBtn" onclick="logoutAdmin()" style="display:none">Logout</button>
<span class="cartIcon" id="cartCount">0</span>
</div>
</header>

<div class="admin" id="adminPanel">
<h3>ADMIN PANEL</h3>
<input id="pname" placeholder="Nom">
<input id="pprice" type="number" placeholder="Prix">
<input id="psizes" placeholder="Tailles S,M,L">
<textarea id="pdesc" placeholder="Description produit"></textarea>
<input id="pimg" type="file" multiple>

<select id="pcat">
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>

<button onclick="addProduct()">Ajouter / Modifier</button>

<hr>
<h3>Produits</h3>
<div id="adminList"></div>
</div>

<div class="searchBox">
<input id="search" placeholder="🔎 Rechercher..." onkeyup="render()">
<select id="filterCat" onchange="render()">
<option value="All">Toutes</option>
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>
</div>

<div class="container" id="shop"></div>
<div class="detail" id="detail"></div>

<div id="cart">
<h3>Panier</h3>
<ul id="cartList"></ul>
<h4>Total : <span id="total">0</span> TND</h4>
<button onclick="openCheckout()">Checkout</button>
</div>

<div class="checkout" id="checkout">
<h3>Livraison</h3>
<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prenom">
<input id="adresse" placeholder="Adresse">
<input id="tel" placeholder="Telephone">
<button onclick="order()">Commander WhatsApp</button>
<button class="back" onclick="closeCheckout()">Retour</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyAHeplm9Z6yL_0OSkPrtf0vJnIN0a5KUws",
authDomain:"deuro-a2bee.firebaseapp.com",
projectId:"deuro-a2bee"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.firestore()

let produits=[]
let panier=JSON.parse(localStorage.getItem("panier"))||[]
let editIndex=-1
let isAdmin=false

firebase.auth().onAuthStateChanged(u=>{
isAdmin=!!u
adminPanel.style.display=isAdmin?"block":"none"
logoutBtn.style.display=isAdmin?"inline-block":"none"
})

function loginAdmin(){
let email=prompt("Email")
let pass=prompt("Password")
firebase.auth().signInWithEmailAndPassword(email,pass)
}

function logoutAdmin(){firebase.auth().signOut()}

function protect(){
if(!isAdmin){alert("Login admin requis");throw "not admin"}
}

db.collection("produits").onSnapshot(s=>{
produits=[]
s.forEach(d=>produits.push({...d.data(),id:d.id}))
render()
})

async function addProduct(){
protect()

let name=pname.value.trim()
let price=parseFloat(pprice.value)
let sizes=psizes.value.trim()
let desc=pdesc.value.trim()
let cat=pcat.value
let files=pimg.files

if(!name||!price||!sizes||!desc)return alert("Remplir")

let imgs = editIndex>=0 ? produits[editIndex].imgs : []

if(files.length>0){
imgs=[]
for(let f of files){
let reader=new FileReader()
await new Promise(res=>{
reader.onload=e=>{
let img=new Image()
img.onload=()=>{
let canvas=document.createElement("canvas")
let ratio=Math.min(300/img.width,300/img.height)
canvas.width=img.width*ratio
canvas.height=img.height*ratio
canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height)
imgs.push(canvas.toDataURL("image/jpeg",0.4))
res()
}
img.src=e.target.result
}
reader.readAsDataURL(f)
})
}

let data={name,price,desc,cat,sizes:sizes.split(","),imgs}

if(editIndex>=0){
await db.collection("produits").doc(produits[editIndex].id).update(data)
editIndex=-1
}else{
await db.collection("produits").add(data)
}

alert("Produit sauvegardé")
}

async function deleteProduct(i){
protect()
if(!confirm("Supprimer ?")) return
await db.collection("produits").doc(produits[i].id).delete()
}

function editProduct(i){
protect()
let p=produits[i]
pname.value=p.name
pprice.value=p.price
psizes.value=p.sizes.join(",")
pdesc.value=p.desc
pcat.value=p.cat
editIndex=i
window.scrollTo(0,0)
}

function render(){
let html="",adminHtml=""
produits.forEach((p,i)=>{
html+=`<div class="product" onclick="openDetail(${i})">
<img src="${p.imgs[0]}"><h3>${p.name}</h3><p>${p.cat}</p><h4>${p.price} TND</h4></div>`
if(isAdmin){
adminHtml+=`<div><b>${p.name}</b>
<button onclick="editProduct(${i})">Edit</button>
<button onclick="deleteProduct(${i})">Del</button></div>`
}
})
shop.innerHTML=html
adminList.innerHTML=adminHtml
displayCart()
}

function openDetail(i){
let p=produits[i]
detail.style.display="block"
detail.innerHTML=`<img src="${p.imgs[0]}" class="mainImg">
<p>${p.desc||""}</p>
<h2>${p.name}</h2>
<h3>${p.price} TND</h3>
<select id="sizeChoice">${p.sizes.map(s=>`<option>${s}</option>`)}</select>
<button onclick="addToCart(${i})">Ajouter</button>`
}

function smartAnim(){
cartCount.classList.add("cartPulse")
setTimeout(()=>cartCount.classList.remove("cartPulse"),400)
}

function addToCart(i){
let size=sizeChoice.value
let f=panier.find(p=>p.name===produits[i].name&&p.size===size)
if(f)f.q++
else panier.push({name:produits[i].name,price:produits[i].price,size,q:1})
save()
smartAnim()
}

function displayCart(){
let html="",t=0,c=0
panier.forEach((p,i)=>{
t+=p.price*p.q
c+=p.q
html+=`<li>${p.name} ${p.size}
<button onclick="minus(${i})">-</button>${p.q}
<button onclick="plus(${i})">+</button></li>`
})
cartList.innerHTML=html
total.innerText=t
cartCount.innerText=c
}

function plus(i){panier[i].q++;save()}
function minus(i){panier[i].q>1?panier[i].q--:panier.splice(i,1);save()}
function save(){localStorage.setItem("panier",JSON.stringify(panier));displayCart()}

function openCheckout(){checkout.style.display="block"}
function closeCheckout(){checkout.style.display="none"}

function order(){
if(!panier.length)return alert("Panier vide")
window.open("https://wa.me/33754436855")
panier=[]
save()
checkout.style.display="none"
}

</script>

</body>
</html>
