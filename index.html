<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#eef2ff,#ffffff,#fce7f3);
}

header{
background:#111827;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:center;
gap:15px;
font-size:26px;
font-weight:bold;
}

.logo{height:40px}

.admin{
display:none;
background:white;
width:90%;
max-width:800px;
margin:20px auto;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.admin input,.admin textarea,.admin select{
width:95%;
padding:10px;
margin:6px;
border-radius:8px;
border:1px solid #ccc;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:25px;
}

.product{
background:white;
width:230px;
border-radius:18px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
padding:15px;
text-align:center;
transition:.2s;
}

.product:hover{
transform:translateY(-3px);
}

.product img{
width:100%;
height:180px;
object-fit:cover;
border-radius:12px;
}

.deleteBtn{
background:red;
color:white;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

</style>

</head>

<body>

<header>
<img src="deuro.tn.png" class="logo">
Deuro.tn
</header>

<div class="admin" id="adminPanel">

<h3>Ajouter Plusieurs Produits</h3>

<textarea id="bulkProducts" rows="6"
placeholder="Format :
Nom|Prix|Categorie|Tailles|Caracteristiques
Tshirt Nike|80|Tshirt|S,M,L|Coton premium
Chaussure Air|220|Shoes|40,41,42|Running">
</textarea>

<input type="file" id="multiImg" multiple>

<button onclick="addBulk()">Ajouter Tous</button>

</div>

<div class="container" id="shop"></div>

<script>

let produits = JSON.parse(localStorage.getItem("produits")) || []

function save(){
localStorage.setItem("produits",JSON.stringify(produits))
}

let secretCode="admin2025"
let typed=""

document.addEventListener("keydown",e=>{
typed+=e.key
if(typed.length>secretCode.length) typed=typed.slice(1)
if(typed===secretCode){
adminPanel.style.display="block"
alert("ADMIN MODE")
}
})

function addBulk(){

let lines = bulkProducts.value.split("\n")
let files = multiImg.files

let fileIndex=0

lines.forEach(line=>{

if(line.trim()=="") return

let parts=line.split("|")

let name=parts[0]
let price=parseInt(parts[1])
let cat=parts[2]
let sizes=parts[3].split(",")
let desc=parts[4]

let imgs=[]

for(let i=0;i<2 && fileIndex<files.length;i++){

let reader=new FileReader()

reader.onload=e=>{
imgs.push(e.target.result)

if(imgs.length==2){
produits.push({name,price,cat,sizes,desc,imgs})
save()
render()
}
}

reader.readAsDataURL(files[fileIndex])
fileIndex++

}

})

}

function render(){

let html=""

produits.forEach((p,i)=>{

html+=`
<div class="product">

<img src="${p.imgs[0]}">

<h3>${p.name}</h3>
<p><b>${p.price} TND</b></p>
<p>${p.desc}</p>

<p>Tailles: ${p.sizes.join(",")}</p>

<button class="deleteBtn" onclick="deleteProduct(${i})">Supprimer</button>

</div>
`
})

shop.innerHTML=html

}

function deleteProduct(i){

if(confirm("Supprimer produit ?")){
produits.splice(i,1)
save()
render()
}

}

render()

</script>

</body>
</html>
