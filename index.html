<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deuro.tn</title>

<style>
body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#eef2ff,#ffffff,#fce7f3);
}

header{
background:#111827;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.logoBox{
display:flex;
align-items:center;
gap:10px;
font-size:24px;
font-weight:bold;
}

.logo{height:40px}

.cartIcon{
background:#22c55e;
width:35px;
height:35px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.admin{
display:none;
background:white;
width:90%;
max-width:750px;
margin:20px auto;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.searchBox{text-align:center;margin-top:20px}

.searchBox input,.searchBox select{
padding:12px;
border-radius:12px;
border:1px solid #ddd;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:30px;
}

.product{
background:white;
width:240px;
border-radius:20px;
padding:15px;
text-align:center;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.product img{
width:100%;
border-radius:15px;
}

.detail{
display:none;
background:white;
width:90%;
max-width:520px;
margin:30px auto;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.mainImg{width:100%;border-radius:20px}

.thumbs{
display:flex;
gap:8px;
justify-content:center;
flex-wrap:wrap;
}

.thumbs img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

#cart{
position:fixed;
right:20px;
top:120px;
background:white;
width:300px;
border-radius:20px;
padding:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
max-height:70vh;
overflow:auto;
}

button{
background:#22c55e;
color:white;
border:none;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.back{background:#111827}

</style>
</head>

<body>

<header>
<div class="logoBox">
<img src="deuro.tn.png" class="logo">
Deuro.tn
</div>
<div class="cartIcon" id="cartCount">0</div>
</header>

<div class="admin" id="adminPanel">
<h3>ADMIN PANEL</h3>

<input id="pname" placeholder="Nom">
<input id="pprice" type="number" placeholder="Prix">
<input id="psizes" placeholder="Tailles S,M,L">
<input id="pimg" type="file" multiple>

<select id="pcat">
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>

<button onclick="addProduct()">Ajouter</button>
</div>

<div class="searchBox">
<input id="search" placeholder="🔎 Rechercher..." onkeyup="render()">
<select id="filterCat" onchange="render()">
<option value="All">Toutes</option>
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>
</div>

<div class="container" id="shop"></div>
<div class="detail" id="detail"></div>

<div id="cart">
<h3>Panier</h3>
<ul id="cartList"></ul>
<h4>Total : <span id="total">0</span> TND</h4>
</div>

<script>

let produits = JSON.parse(localStorage.getItem("produits")) || []
let panier = JSON.parse(localStorage.getItem("panier")) || []

/* ADMIN SECRET */

let secret="aida"
let typed=""

document.addEventListener("keydown",e=>{
typed+=e.key
if(typed.length>secret.length) typed=typed.slice(1)
if(typed===secret){
adminPanel.style.display="block"
alert("ADMIN MODE")
}
})

function saveProducts(){
localStorage.setItem("produits",JSON.stringify(produits))
}

/* ADD PRODUCT */

function addProduct(){

let name=pname.value.trim()
let price=pprice.value
let sizes=psizes.value.trim()
let cat=pcat.value
let files=pimg.files

if(name=="" || price=="" || sizes==""){
alert("Remplir champs")
return
}

if(files.length==0){
alert("Choisir image")
return
}

price=parseFloat(price)

let images=[]
let loaded=0

for(let i=0;i<files.length;i++){

let reader=new FileReader()

reader.onload=function(e){

images.push(e.target.result)
loaded++

if(loaded==files.length){

produits.push({
name:name,
price:price,
sizes:sizes.split(","),
cat:cat,
imgs:images
})

saveProducts()

alert("Produit ajouté")

pname.value=""
pprice.value=""
psizes.value=""
pimg.value=""

render()

}

}

reader.readAsDataURL(files[i])

}

}

/* RENDER */

function render(){

detail.style.display="none"

let search=searchInput()

let cat=document.getElementById("filterCat").value

let html=""

produits.forEach((p,i)=>{

if(p.name.toLowerCase().includes(search) && (cat=="All"||cat==p.cat)){

let img = p.imgs ? p.imgs[0] : p.img

html+=`
<div class="product" onclick="openDetail(${i})">
<img src="${img}">
<h3>${p.name}</h3>
<h4>${p.price} TND</h4>
</div>
`

}

})

shop.innerHTML=html

}

/* SEARCH LOWER */

function searchInput(){
return document.getElementById("search").value.toLowerCase()
}

/* DETAIL */

function openDetail(i){

let p=produits[i]

let thumbs=""

p.imgs.forEach(img=>{
thumbs+=`<img src="${img}" onclick="changeImg('${img}')">`
})

detail.style.display="block"

detail.innerHTML=`
<img src="${p.imgs[0]}" id="mainImg" class="mainImg">
<div class="thumbs">${thumbs}</div>
<h2>${p.name}</h2>
<h3>${p.price} TND</h3>
<button class="back" onclick="render()">Retour</button>
`

window.scrollTo(0,0)

}

function changeImg(src){
document.getElementById("mainImg").src=src
}

render()

</script>

</body>
</html>
