<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Deuro.tn</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#eef2ff,#ffffff,#fce7f3);
}

/* HEADER */

header{
background:#111827;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:999;
}

.logoBox{
display:flex;
align-items:center;
gap:10px;
font-size:24px;
font-weight:bold;
}

.logo{height:40px}

.cartIcon{
background:#22c55e;
width:35px;
height:35px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

/* ADMIN */

.admin{
display:none;
background:white;
width:90%;
max-width:700px;
margin:20px auto;
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* SEARCH */

.searchBox{
text-align:center;
margin-top:20px;
}

.searchBox input,.searchBox select{
padding:12px;
border-radius:12px;
border:1px solid #ddd;
}

/* PRODUCTS */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
padding:30px;
}

.product{
background:white;
width:240px;
border-radius:20px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.product:hover{
transform:translateY(-10px);
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

.product img{
width:100%;
border-radius:15px;
transition:0.4s;
}

.product:hover img{
transform:scale(1.08);
}

.cat{
background:#eef2ff;
padding:5px 12px;
border-radius:20px;
font-size:12px;
display:inline-block;
}

/* DETAIL */

.detail{
display:none;
background:white;
width:90%;
max-width:500px;
margin:30px auto;
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
animation:pop 0.4s;
}

@keyframes pop{
from{transform:scale(0.7);opacity:0}
to{transform:scale(1);opacity:1}
}

/* CART */

#cart{
position:fixed;
right:20px;
top:120px;
background:white;
width:300px;
border-radius:20px;
padding:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
max-height:70vh;
overflow:auto;
}

.qtyBtn{
background:#111827;
color:white;
border:none;
width:25px;
height:25px;
border-radius:6px;
}

.remove{
background:red;
color:white;
border:none;
border-radius:6px;
}

button{
background:linear-gradient(45deg,#22c55e,#16a34a);
color:white;
border:none;
padding:12px 20px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

.back{
background:#111827;
}

/* CHECKOUT */

.checkout{
display:none;
background:white;
width:90%;
max-width:500px;
margin:30px auto;
padding:20px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

.checkout input{
width:95%;
padding:12px;
margin:8px;
border-radius:10px;
border:1px solid #ddd;
}

/* MOBILE */

@media(max-width:700px){

#cart{
bottom:0;
top:auto;
right:0;
width:100%;
border-radius:25px 25px 0 0;
}

.container{
padding-bottom:180px;
}

}

</style>
</head>

<body>

<header>

<div class="logoBox">
<img src="deuro.tn.png" class="logo">
Deuro.tn
</div>

<div class="cartIcon" id="cartCount">0</div>

</header>

<div class="admin" id="adminPanel">
<h3>ADMIN PANEL</h3>

<input id="pname" placeholder="Nom">
<input id="pprice" type="number" placeholder="Prix">
<input id="psizes" placeholder="Tailles S,M,L">
<input id="pimg" type="file">

<select id="pcat">
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>

<button onclick="addProduct()">Ajouter</button>

</div>

<div class="searchBox">
<input id="search" placeholder="🔎 Rechercher..." onkeyup="render()">
<select id="filterCat" onchange="render()">
<option value="All">Toutes</option>
<option>Tshirt</option>
<option>Shoes</option>
<option>Cap</option>
<option>Other</option>
</select>
</div>

<div class="container" id="shop"></div>

<div class="detail" id="detail"></div>

<div id="cart">
<h3>Panier</h3>
<ul id="cartList"></ul>
<h4>Total : <span id="total">0</span> TND</h4>
<button onclick="openCheckout()">Checkout</button>
</div>

<div class="checkout" id="checkout">
<h3>Livraison</h3>
<input id="nom" placeholder="Nom">
<input id="prenom" placeholder="Prenom">
<input id="adresse" placeholder="Adresse">
<input id="tel" placeholder="Telephone">

<button onclick="order()">Commander WhatsApp</button>
<button class="back" onclick="closeCheckout()">Retour</button>
</div>

<script>

let produits=JSON.parse(localStorage.getItem("produits"))||[]
let panier=JSON.parse(localStorage.getItem("panier"))||[]

let secret="admin2025"
let typed=""

document.addEventListener("keydown",e=>{
typed+=e.key
if(typed.length>secret.length) typed=typed.slice(1)
if(typed===secret){
adminPanel.style.display="block"
alert("ADMIN MODE")
}
})

function saveProducts(){
localStorage.setItem("produits",JSON.stringify(produits))
}

function saveCart(){
localStorage.setItem("panier",JSON.stringify(panier))
}

function addProduct(){

let file=pimg.files[0]
let reader=new FileReader()

reader.onload=e=>{
produits.push({
name:pname.value,
price:parseInt(pprice.value),
sizes:psizes.value.split(","),
cat:pcat.value,
img:e.target.result
})
saveProducts()
render()
}

reader.readAsDataURL(file)
}

function render(){

detail.style.display="none"

let search=document.getElementById("search").value.toLowerCase()
let cat=document.getElementById("filterCat").value

let html=""

produits.forEach((p,i)=>{

if(p.name.toLowerCase().includes(search) && (cat=="All"||cat==p.cat)){

html+=`
<div class="product" onclick="openDetail(${i})">
<img src="${p.img}">
<h3>${p.name}</h3>
<p class="cat">${p.cat}</p>
<h4>${p.price} TND</h4>
</div>
`

}

})

shop.innerHTML=html
displayCart()

}

function openDetail(i){

let p=produits[i]
let sizes=""

p.sizes.forEach(s=>sizes+=`<option>${s}</option>`)

detail.style.display="block"

detail.innerHTML=`
<img src="${p.img}" style="width:100%;border-radius:20px">
<h2>${p.name}</h2>
<h3>${p.price} TND</h3>

<select id="sizeChoice">${sizes}</select>

<br>
<button onclick="addToCart(${i})">Ajouter</button>
<button class="back" onclick="render()">Retour</button>
`

window.scrollTo(0,0)

}

function addToCart(i){

let size=sizeChoice.value

let found=panier.find(p=>p.name==produits[i].name && p.size==size)

if(found){
found.q++
}else{
panier.push({
name:produits[i].name,
price:produits[i].price,
size:size,
q:1
})
}

saveCart()
displayCart()

}

function displayCart(){

let html=""
let total=0
let count=0

panier.forEach((p,i)=>{

total+=p.price*p.q
count+=p.q

html+=`
<li>
${p.name} (${p.size})
<br>
<button class="qtyBtn" onclick="minus(${i})">-</button>
${p.q}
<button class="qtyBtn" onclick="plus(${i})">+</button>
<button class="remove" onclick="removeItem(${i})">X</button>
</li>
`

})

cartList.innerHTML=html
document.getElementById("total").innerText=total
document.getElementById("cartCount").innerText=count

}

function plus(i){
panier[i].q++
saveCart()
displayCart()
}

function minus(i){
if(panier[i].q>1){
panier[i].q--
}else{
panier.splice(i,1)
}
saveCart()
displayCart()
}

function removeItem(i){
panier.splice(i,1)
saveCart()
displayCart()
}

function openCheckout(){
checkout.style.display="block"
window.scrollTo(0,0)
}

function closeCheckout(){
checkout.style.display="none"
}

function order(){

if(panier.length==0){
alert("Panier vide")
return
}

let msg="Commande Deuro.tn %0A"

msg+="Nom:"+nom.value+" %0A"
msg+="Prenom:"+prenom.value+" %0A"
msg+="Adresse:"+adresse.value+" %0A"
msg+="Tel:"+tel.value+" %0A"

panier.forEach(p=>{
msg+=p.name+" Taille:"+p.size+" x"+p.q+" %0A"
})

window.open("https://wa.me/33754436855?text="+msg)

}

render()

</script>

</body>
</html>
