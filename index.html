<!DOCTYPE html>
<html>
<head>
<title>Mon Shop</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.product{
background:white;
padding:20px;
border-radius:10px;
width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
padding:10px;
background:#2ecc71;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Mon Site de Réservation</h1>

<div class="container">

<div class="product">
<h3>Article 1</h3>
<input type="number" id="q1" value="0">
<button onclick="add('Article 1',q1.value)">Ajouter</button>
</div>

<div class="product">
<h3>Article 2</h3>
<input type="number" id="q2" value="0">
<button onclick="add('Article 2',q2.value)">Ajouter</button>
</div>

</div>

<h2>Panier</h2>
<ul id="cart"></ul>

<button onclick="send()">Valider la commande</button>

<script>

let panier=[]

function add(name,q){
if(q>0){
panier.push(name+" x"+q)
display()
}
}

function display(){
cart.innerHTML=""
panier.forEach(p=>{
cart.innerHTML+="<li>"+p+"</li>"
})
}

function send(){
let msg="Commande : "+panier.join(", ")
window.location.href="mailto:tonmail@gmail.com?subject=Commande&body="+msg
}

</script>

</body>
</html>
